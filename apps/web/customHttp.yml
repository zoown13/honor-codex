customHeaders:
  - pattern: "**"
    headers:
      - key: "X-Robots-Tag"
        value: "noindex, nofollow, noarchive"
      - key: "Referrer-Policy"
        value: "strict-origin-when-cross-origin"
      - key: "X-Content-Type-Options"
        value: "nosniff"
  - pattern: "/data/**"
    headers:
      - key: "Cache-Control"
        value: "public, max-age=60, stale-while-revalidate=86400"
